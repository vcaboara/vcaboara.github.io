<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARBOREUM | The 12/17/25 Standard</title>
    <script>
        (function () {
            var t = 'light';
            try {
                var storedTheme = localStorage.getItem('theme');
                if (storedTheme === 'dark' || storedTheme === 'light') {
                    t = storedTheme;
                } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    t = 'dark';
                }
            } catch (e) {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    t = 'dark';
                }
            }
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <link rel="stylesheet" href="theme.css">
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: #f8f9fa;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding-bottom: 80px;
            box-sizing: border-box;
        }

        .container {
            max-width: 500px;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: -3px;
            text-transform: uppercase;
            margin-bottom: 0px;
            font-weight: 900;
        }

        .subtitle {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 5px;
            /* Tightened space */
            margin-bottom: 25px;
            /* Reduced space under subtitle */
            display: block;
        }

        .links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            /* Reduced gap between buttons */
        }

        .links a {
            color: #1a1a1a;
            text-decoration: none;
            border: 2px solid #1a1a1a;
            width: 100%;
            max-width: 350px;
            padding: 15px 0;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.7rem;
            letter-spacing: 2px;
            background: #ffffff;
        }

        .links a:hover {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }

        footer {
            position: relative;
            padding: 20px 0;
            font-size: 0.65rem;
            color: #666;
            letter-spacing: 1px;
            text-transform: uppercase;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="container" id="home">
        <h1 id="site-title">ARBOREUM</h1>
        <span class="subtitle">CLOSED-LOOP CARBON-NEGATIVE SYSTEMS</span>

        <div class="links" id="primary-links">
            <a href="standard.html">The 12/17/25 Standard (US 19/424,106) (VTD)</a>
            <a href="arboreum.html">Arboreum Commercial Solutions, LLC</a>
            <a href="mandates.html">Arboreum Impact Foundation Mandates</a>
            <a href="off-the-shelf.html">Off-the-Shelf Industrial Reference</a>
        </div>
    </div>

    <footer id="site-footer">
        Established 2025 | Patent Pending | Site Authority: v.1.0.11
    </footer>

    <button id="theme-toggle-fixed" title="Toggle dark/light mode" aria-label="Toggle dark/light mode">☾</button>
    <script src="theme.js"></script>
    <script>
        function syncThemeToggleFixedButton() {
            var btn = document.getElementById('theme-toggle-fixed');
            if (!btn) {
                return;
            }
            var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            btn.textContent = isDark ? '☀' : '☾';
            btn.title = isDark ? 'Switch to light mode' : 'Switch to dark mode';
            btn.setAttribute('aria-label', btn.title);
        }

        var themeToggleFixedButton = document.getElementById('theme-toggle-fixed');
        if (themeToggleFixedButton) {
            themeToggleFixedButton.addEventListener('click', function () {
                toggleTheme();
                syncThemeToggleFixedButton();
            });
        }

        syncThemeToggleFixedButton();
    </script>
</body>

</html>
