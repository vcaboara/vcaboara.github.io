name: PR Checks

on:
    pull_request:
        branches: ["main"]

permissions:
    contents: read
  pull-requests: read

jobs:
    validations:
        name: Validation Suite
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Run Python validators
              run: |
                  python validate_ledger.py
                  python validate_compliance_tracker.py
                  python validate_mandates.py
                  python validate_anchors.py

    ui-screenshot-policy:
        name: UI Screenshot Policy
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Fetch current PR body
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const { owner, repo } = context.repo;
                      const pull_number = context.payload.pull_request.number;
                      const { data: pr } = await github.rest.pulls.get({
                        owner,
                        repo,
                        pull_number,
                      });
                      const body = pr.body || '';
                      fs.appendFileSync(process.env.GITHUB_ENV, `PR_BODY<<EOF\n${body}\nEOF\n`);

            - name: Enforce BEFORE/AFTER screenshots for UI changes
              run: |
                  python utils/check_pr_ui_screenshots.py \
                    --base-sha "${{ github.event.pull_request.base.sha }}" \
                    --head-sha "${{ github.event.pull_request.head.sha }}"

    ui-screenshot-diff:
        name: UI Screenshot Diff
        runs-on: ubuntu-latest
      permissions:
        contents: read
        pull-requests: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Install screenshot diff dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install pillow playwright
                  python -m playwright install --with-deps chromium

            - name: Compare base/head UI screenshots
              run: |
                  python utils/compare_ui_screenshots.py \
                    --base-sha "${{ github.event.pull_request.base.sha }}" \
                    --head-sha "${{ github.event.pull_request.head.sha }}" \
                    --output-markdown "ui-screenshot-diff-summary.md" \
                    --artifacts-dir "pr-screenshots/ci-diff"

            - name: Add screenshot diff to job summary
              run: cat ui-screenshot-diff-summary.md >> "$GITHUB_STEP_SUMMARY"

            - name: Upload screenshot diff artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ui-screenshot-diff
                  path: |
                      ui-screenshot-diff-summary.md
                      pr-screenshots/ci-diff
                  if-no-files-found: warn

            - name: Comment screenshot diff on PR
              if: github.event.pull_request.head.repo.fork == false
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const marker = '<!-- ui-screenshot-diff-report -->';
                      const summary = fs.readFileSync('ui-screenshot-diff-summary.md', 'utf8');
                      const body = `${marker}\n${summary}`;

                      const { owner, repo } = context.repo;
                      const issue_number = context.payload.pull_request.number;

                      const comments = await github.paginate(github.rest.issues.listComments, {
                        owner,
                        repo,
                        issue_number,
                        per_page: 100
                      });

                      const existing = comments.find(comment =>
                        comment.user && comment.user.type === 'Bot' && comment.body && comment.body.includes(marker)
                      );

                      if (existing) {
                        await github.rest.issues.updateComment({
                          owner,
                          repo,
                          comment_id: existing.id,
                          body
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number,
                          body
                        });
                      }
